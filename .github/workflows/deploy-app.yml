name: Deploy Application

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    outputs:
      artifact-path: ${{ steps.publish.outputs.artifact-path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/MafDemo.Api/MafDemo.Api.csproj
        shell: bash

      - name: Build application
        run: dotnet build src/MafDemo.Api/MafDemo.Api.csproj --configuration Release --no-restore
        shell: bash

      - name: Run tests (if tests exist)
        run: |
          if [ -d "src/MafDemo.Tests" ]; then
            dotnet test src/MafDemo.Tests/MafDemo.Tests.csproj --configuration Release --no-build --verbosity normal
          else
            echo "⚠️ No test project found, skipping tests"
          fi
        shell: bash
        continue-on-error: true

      - name: Publish application
        id: publish
        run: |
          dotnet publish src/MafDemo.Api/MafDemo.Api.csproj \
            --configuration Release \
            --output ./publish \
            --no-restore \
            --no-build

          # Create zip for deployment
          cd publish
          zip -r ../maf-demo-app.zip . -q
          cd ..

          ARTIFACT_PATH=$(pwd)/maf-demo-app.zip
          echo "artifact-path=$ARTIFACT_PATH" >> $GITHUB_OUTPUT
          echo "✅ Application published successfully"
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: maf-demo-app
          path: maf-demo-app.zip
          retention-days: 5

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: maf-demo-app

      - name: Deploy to App Service
        run: |
          APP_SERVICE_NAME="maf-demo-api"
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"

          echo "📦 Deploying to App Service: $APP_SERVICE_NAME"

          az webapp deployment source config-zip \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group $RESOURCE_GROUP \
            --name $APP_SERVICE_NAME \
            --src maf-demo-app.zip

          echo "✅ Application deployed successfully"

          # Get app URL
          APP_URL=$(az webapp show \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group $RESOURCE_GROUP \
            --name $APP_SERVICE_NAME \
            --query defaultHostName \
            --output tsv)

          echo "🌐 App URL: https://$APP_URL"
        shell: bash

      - name: Verify deployment
        run: |
          APP_SERVICE_NAME="maf-demo-api"
          RESOURCE_GROUP="${{ secrets.AZURE_RESOURCE_GROUP }}"

          echo "⏳ Waiting for app to start..."
          sleep 10

          # Get app URL and test health endpoint
          APP_URL=$(az webapp show \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group $RESOURCE_GROUP \
            --name $APP_SERVICE_NAME \
            --query defaultHostName \
            --output tsv)

          echo "🔍 Testing health endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$APP_URL/health" || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS (expected 200)"
            echo "   App may still be starting up or endpoint may differ"
          fi
        shell: bash
        continue-on-error: true

      - name: Logout from Azure
        run: az logout
        if: always()
